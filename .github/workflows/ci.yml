name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: agentos_test
          POSTGRES_USER: agentos
          POSTGRES_PASSWORD: agentos
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { version: "latest", python-version: "3.13" }
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check app/
      - run: uv run ruff format app/ --check
      - run: uv run python3 -m mypy app/ --strict

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { version: "latest", python-version: "3.13" }
      - run: uv sync --frozen --all-extras
      - run: uv run bandit -r app/ -ll -f json -o bandit-report.json || true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.13"]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: agentos_test
          POSTGRES_USER: agentos
          POSTGRES_PASSWORD: agentos
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { version: "latest", python-version: "3.13" }
      - run: uv sync --frozen --all-extras
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://agentos:agentos@localhost/agentos_test
        run: uv run alembic upgrade head || echo "Migrations placeholder"
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentos:agentos@localhost/agentos_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          uv run python3 -m pytest app/tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=99 \
            -v \
            --tb=short
      - uses: codecov/codecov-action@v4
        with: { files: coverage.xml }

  validate:
    name: Pre-Release Validation
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'release'
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: agentos_test
          POSTGRES_USER: agentos
          POSTGRES_PASSWORD: agentos
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { version: "latest", python-version: "3.13" }
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check app/ --fix && uv run ruff format app/ --check
      - run: uv run python3 -m mypy app/ --strict --exclude="tests/"
      - name: Run tests + coverage
        env:
          DATABASE_URL: postgresql+asyncpg://agentos:agentos@localhost/agentos_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: uv run python3 -m pytest app/tests/ --cov=app --cov-fail-under=98 -q --tb=short
      - run: uv run bandit -r app/ -ll -q
      - name: Validate docker-compose
        run: docker compose config --quiet
      - name: Check alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://agentos:agentos@localhost/agentos_test
        run: uv run alembic check
      - name: Fail on any issue
        if: failure()
        run: |
          echo "❌ Pre-release validation failed — fix all issues before releasing"
          exit 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security, validate]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment: production
    steps:
      - name: Check secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_KEY }}" ]; then
            echo "Secrets not configured — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy via SSH
        if: steps.check_secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/agentos
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
