name: agentos

networks:
  agentos_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  # strapi_data:
  # ollama_data:
  jaeger_data:
  minio_data:
  caddy_data:

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: agentos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentos
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_demo_password
    ports:
      - "${AGENTOS_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - agentos_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass agentos_redis_demo
    ports:
      - "${AGENTOS_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentos_net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: agentos-mailhog
    restart: unless-stopped
    ports:
      - "${AGENTOS_MAILHOG_UI_PORT:-8025}:8025"
      - "${AGENTOS_MAILHOG_SMTP_PORT:-1025}:1025"
    networks:
      - agentos_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # strapi disabled — naskio/strapi:latest image has missing react dependency
  # To re-enable: use official strapi/strapi image or pin a working version
  # strapi:
  #   image: naskio/strapi:latest
  #   container_name: agentos-strapi
  #   ...

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: agentos-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${AGENTOS_JAEGER_UI_PORT:-16686}:16686"
      - "${AGENTOS_JAEGER_OTLP_PORT:-4318}:4318"
    volumes:
      - jaeger_data:/tmp
    networks:
      - agentos_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: agentos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentos
      MINIO_ROOT_PASSWORD: agentos_minio_demo
    ports:
      - "${AGENTOS_MINIO_API_PORT:-9000}:9000"
      - "${AGENTOS_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - agentos_net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 2>/dev/null && exec 3>&-"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: agentos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - agentos_net
    depends_on:
      app:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    container_name: agentos-app
    restart: unless-stopped
    image: agentos-local:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: agentos
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_demo_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: agentos_redis_demo
      JWT_SECRET: ${JWT_SECRET:-agentos-v6-compose-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-60/minute}
    ports:
      - "${AGENTOS_API_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - agentos_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  web:
    build:
      context: ./app/web
      dockerfile: Dockerfile.web
    container_name: agentos-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    ports:
      - "${AGENTOS_WEB_PORT:-3000}:3000"
    networks:
      - agentos_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

